<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

  <div class="calculator-wrap">

    <div style="min-height: 250px;" class="wrap">
      <div class="calc"></div>
      <div class="result"></div>
      <div class="button">
        <div><button value="AC" class="bg-gray">AC</button></div>
        <div><button value="" class="bg-gray">+/-</button></div>
        <div><button class="bg-gray">%</button></div>
        <div><button value="/" class="bg-yellow">&divide;</button></div>


        <div><button value="7" class="bg-gray-1">7</button></div>
        <div><button value="8" class="bg-gray-1">8</button></div>
        <div><button value="9" class="bg-gray-1">9</button></div>
        <div><button value="*" class="bg-yellow">&#10005;</button></div>


        <div><button value="4" class="bg-gray-1">4</button></div>
        <div><button value="5" class="bg-gray-1">5</button></div>
        <div><button value="6" class="bg-gray-1">6</button></div>
        <div><button value="-" class="bg-yellow">-</button></div>

        <div><button value="1" class="bg-gray-1">1</button></div>
        <div><button value="2" class="bg-gray-1">2</button></div>
        <div><button value="3" class="bg-gray-1">3</button></div>
        <div><button value="+" class="bg-yellow">+</button></div>

        <div><button value="C" class="bg-gray-1 z">C</button></div>
        <div><button value="0" class="bg-gray-1">0</button></div>
        <div><button value="." class="bg-gray-1">.</button></div>
        <div><button value="=" class="bg-yellow">=</button></div>
      </div>

    </div>

  </div>
  <script>
    $(() => {
      let op = "";
      const operator = {
        "*": "x",
      }

      $(".button button").on("click", function(e) {
        let clicked = $(this).val();
        console.log(clicked)
        console.log(op);

        if (clicked === "=") {
          try {
            let val = eval(op);
            $(".result").text(val);
            $(".calc").text(op);
            // console.log(val)
            // result.text(val);
            op = val;
          } catch {
            op = ""
          }
        } else if (clicked === "AC") {
          op = "";
          $(".result").text(op)
          $(".calc").text(op);
        }
        else if (clicked === "C") {
          op = op.slice(0, -1);
          $(".result").text(op);
        }
        else if (clicked !== undefined) {
          op += clicked;
          $(".result").text(op)
          console.log(clicked);
        }
        else {
          console.log(clicked);
        }
      });
    });
  </script>
</body>

</html>
